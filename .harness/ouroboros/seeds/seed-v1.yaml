version: 1
created: "2026-04-24T00:00:00"
interview_ref: "2026-04-24-00-00.yaml"

goal:
  summary: "FastAPI + Next.js + LangGraph 포트폴리오 프로젝트의 docker-compose 기반 인프라 스켈레톤을 구성하여 make up 한 번으로 전체 스택이 기동되는 실행 가능한 기반 환경을 만든다."
  detail: >
    한국 공공데이터 포털 OpenAPI를 활용할 포트폴리오 미니프로젝트의 개발 환경 기반이 되는 스켈레톤이다.
    FastAPI(/health 응답), Next.js(hello world 페이지), PostgreSQL 세 컨테이너가
    Makefile로 제어되는 docker-compose 환경에서 정상 기동된다.
    실제 공공데이터 연동 기능과 LangGraph 에이전트 구현은 별도 시드(v2+)에서 다룬다.
  non_goals:
    - "한국 공공데이터 포털 OpenAPI 연동 기능 구현"
    - "LangGraph 에이전트/그래프 실제 구현"
    - "Redis, Celery 포함"
    - "prod / dev 환경 분리 (별도 compose 파일)"
    - "인증·권한 시스템"
    - "nginx reverse proxy"
    - "CI/CD 파이프라인"

constraints:
  must:
    - "Python 3.13 + uv 패키지 매니저 사용 (app)"
    - "app Dockerfile: multi-stage build (builder → runtime) + non-root 유저 실행"
    - "Next.js 15 App Router + output: standalone 모드 사용 (ui)"
    - "ui Dockerfile: multi-stage build (node builder → slim runtime) + non-root 유저 실행"
    - "단일 docker-compose.yml 파일로 전체 스택 관리"
    - "Makefile로 docker-compose 명령 래핑 (up, down, build, logs, ps 최소 포함)"
    - "컨테이너 이름 prefix: pu- (pu-app, pu-ui, pu-postgresql)"
    - "모노레포: app/, ui/ 폴더를 repo 루트에 배치"
    - "Docker bridge network로 컨테이너 간 통신 (컨테이너 이름으로 호출)"
    - "langgraph를 app의 pyproject.toml dependency에 포함"
    - "PostgreSQL 17 Alpine 이미지 사용"
    - ".env.sample 제공 (모든 필수 환경변수 포함)"
    - "make up 실행 시 pu-app, pu-ui, pu-postgresql 3개 컨테이너 모두 기동"
  must_not:
    - "root 유저로 컨테이너 실행"
    - "코드 또는 Dockerfile에 시크릿(비밀번호, API 키) 하드코딩"
    - ".env 파일을 git에 커밋"
    - "Redis, Celery 서비스를 이번 스켈레톤에 포함"
    - "prod/dev 분리 compose 파일 생성"
    - "nginx를 별도 서비스로 추가"
    - "Presentation 레이어에서 Data 레이어 직접 접근 (레이어 스킵)"
  should:
    - "각 서비스에 healthcheck 설정"
    - "docker-compose.yml에 YAML anchor로 공통 설정 재사용"
    - ".gitignore에 .env, __pycache__, .next, node_modules 포함"
    - "app pyproject.toml에 fastapi, uvicorn, langgraph, asyncpg, sqlalchemy 포함"
    - "make shell-app, make shell-ui 타겟으로 컨테이너 접속 편의 제공"
    - "Makefile에 .env 자동 로드 (참고 프로젝트 패턴 유지)"

