ontology:
  entities:
    - name: "AppService"
      description: "FastAPI 백엔드 컨테이너"
      fields:
        - name: "containerName"
          type: "string"
          required: true
        - name: "port"
          type: "number"
          required: true
        - name: "image"
          type: "string"
          required: true
        - name: "user"
          type: "string"
          required: true
      relationships:
        - target: "DatabaseService"
          type: "depends_on"
        - target: "DockerNetwork"
          type: "belongs_to"

    - name: "UiService"
      description: "Next.js 프론트엔드 컨테이너 (standalone 서버)"
      fields:
        - name: "containerName"
          type: "string"
          required: true
        - name: "port"
          type: "number"
          required: true
        - name: "image"
          type: "string"
          required: true
        - name: "user"
          type: "string"
          required: true
      relationships:
        - target: "AppService"
          type: "calls_api"
        - target: "DockerNetwork"
          type: "belongs_to"

    - name: "DatabaseService"
      description: "PostgreSQL 17 Alpine 컨테이너"
      fields:
        - name: "containerName"
          type: "string"
          required: true
        - name: "port"
          type: "number"
          required: true
        - name: "dbUser"
          type: "string"
          required: true
        - name: "dbPassword"
          type: "string"
          required: true
        - name: "dbName"
          type: "string"
          required: true
      relationships:
        - target: "DockerNetwork"
          type: "belongs_to"

    - name: "DockerNetwork"
      description: "컨테이너 간 통신을 위한 bridge 네트워크"
      fields:
        - name: "name"
          type: "string"
          required: true
        - name: "driver"
          type: "string"
          required: true

  actions:
    - name: "startStack"
      actor: "developer"
      input: "make up"
      output: "3개 컨테이너 기동 (pu-app, pu-ui, pu-postgresql)"
      side_effects:
        - "Docker 이미지 빌드 (없을 경우)"
        - "컨테이너 네트워크 생성"

    - name: "buildImages"
      actor: "developer"
      input: "make build"
      output: "pu-app 이미지, pu-ui 이미지"
      side_effects:
        - "multi-stage Docker 빌드 실행"
        - "uv로 Python 의존성 설치 (builder stage)"
        - "next build로 standalone 번들 생성 (builder stage)"

    - name: "healthCheck"
      actor: "docker-engine / developer"
      input: "GET /health"
      output: "HTTP 200 {\"status\": \"ok\"}"
      side_effects: []

    - name: "stopStack"
      actor: "developer"
      input: "make down"
      output: "모든 컨테이너 중지 및 제거"
      side_effects:
        - "네트워크 제거"

architecture:
  pattern: "3-tier-layered"
  layers:
    presentation:
      description: "Next.js App Router (ui/) — 페이지 렌더링, FastAPI API 호출 프록시"
      directories:
        - "ui/src/app"
        - "ui/src/components"
      responsibilities:
        - "HTTP 페이지 렌더링"
        - "사용자 입력 수집 및 표시"
        - "FastAPI 백엔드로 API 요청 프록시"
      cannot_access:
        - "database"
        - "langgraph_directly"
    logic:
      description: "FastAPI routers + service layer (app/) — API 엔드포인트, LangGraph 진입점"
      directories:
        - "app/routers"
        - "app/services"
        - "app/schemas"
      responsibilities:
        - "HTTP 요청 수신 및 응답 포맷팅"
        - "비즈니스 로직 (서비스 레이어)"
        - "LangGraph 에이전트 호출 (향후)"
        - "입력 검증 (Pydantic)"
      cannot_access:
        - "ui_code"
    data:
      description: "SQLAlchemy models + repository layer (app/database, app/repositories)"
      directories:
        - "app/database"
        - "app/models"
        - "app/repositories"
      responsibilities:
        - "PostgreSQL 연결 및 쿼리"
        - "ORM 모델 정의"
        - "외부 API 호출 (향후: 공공데이터 포털)"
      cannot_access:
        - "routers"
        - "ui_code"
  layer_communication:
    presentation_to_logic: "HTTP REST API (Docker bridge network)"
    logic_to_data: "repository pattern (SQLAlchemy async session)"
    data_format: "Pydantic schemas (DTO)"

scope:
  mvp:
    - "docker-compose.yml (pu-app, pu-ui, pu-postgresql 서비스 정의)"
    - "Makefile (up, down, build, logs, ps, shell-app, shell-ui)"
    - "app/Dockerfile (Python 3.13, uv, multi-stage, non-root)"
    - "app/pyproject.toml (fastapi, uvicorn, langgraph, asyncpg, sqlalchemy)"
    - "app/main.py (FastAPI 앱, /health 엔드포인트)"
    - "ui/Dockerfile (Node 22, Next.js standalone, multi-stage, non-root)"
    - "ui/package.json + next.config.ts (output: standalone)"
    - "ui/src/app/page.tsx (hello world 페이지)"
    - ".env.sample (모든 필수 환경변수)"
    - ".gitignore (.env, __pycache__, .next, node_modules)"
  future:
    - "한국 공공데이터 포털 OpenAPI 클라이언트 (seed-v2)"
    - "LangGraph 에이전트/그래프 구현 (seed-v2)"
    - "Redis + Celery worker/flower 추가 (seed-v3)"
    - "실제 비즈니스 로직 및 DB 스키마 (seed-v2+)"
    - "CI/CD 파이프라인"
    - "인증/권한 시스템"

tech_decisions:
  - decision: "uv를 Python 패키지 매니저로 사용"
    reason: "2024~2025년 가장 빠른 성장세의 modern Python 패키지 매니저. pip/poetry 대비 10~100x 빠른 설치 속도. Rust 기반으로 lockfile 지원."
    alternatives_considered:
      - "pip + requirements.txt (구식, lockfile 미지원)"
      - "poetry (무겁고 느림, Docker multi-stage에서 복잡)"

  - decision: "Next.js standalone output 모드 사용"
    reason: "nginx 없이 Next.js 자체 서버(server.js)가 서빙. 컨테이너 구조 단순화. 향후 SSR/API Routes 활용 가능."
    alternatives_considered:
      - "next export + nginx (정적 파일만 서빙, SSR 불가 — 미래 기능 제한)"
      - "nginx + static export (nginx 별도 서비스 필요, 복잡도 증가)"

  - decision: "multi-stage Dockerfile (builder → runtime)"
    reason: "빌드 도구(uv, node, npm)를 최종 이미지에서 제외하여 이미지 크기 감소 및 보안 공격 면적 최소화."
    alternatives_considered:
      - "단일 stage Dockerfile (간단하지만 이미지 크기 크고 보안 취약)"

  - decision: "non-root 유저로 컨테이너 실행"
    reason: "컨테이너 탈출 공격 시 호스트 피해 최소화. 포트폴리오에서 운영 수준 보안 베스트 프랙티스 어필."
    alternatives_considered:
      - "root 실행 (간단하지만 보안 취약, 포트폴리오 마이너스)"

  - decision: "단일 docker-compose.yml (prod/dev 분리 없음)"
    reason: "포트폴리오 목적으로 단순성 우선. prod/dev 분리는 실제 서비스 운영 시 필요하나 이 프로젝트 범위 외."
    alternatives_considered:
      - "docker-compose.yml + docker-compose.override.yml (불필요한 복잡도)"

  - decision: "PostgreSQL 17 Alpine 이미지"
    reason: "최신 안정 버전. Alpine 기반으로 이미지 크기 최소화."
    alternatives_considered:
      - "PostgreSQL 16 (이전 버전, 기능 제한)"
      - "PostgreSQL 17 Debian (이미지 크기 더 큼)"
